name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        # Runtime deps only (from pyproject); no API key, no real model calls.
        run: pip install fastapi "uvicorn[standard]" python-dotenv httpx pydantic

      - name: Compile / import check
        run: |
          python -m compileall -q backend
          python -c "import backend.cli, backend.guards, backend.project_workspace, backend.council"

      - name: CLI smoke (no-model commands, no key)
        run: |
          python -m backend.cli --version
          python -m backend.cli presets
          python -m backend.cli models

      - name: Run tests
        # Stdlib unittest — no extra test dependency required.
        run: python -m unittest discover -s tests -t .

      - name: POSIX wrapper smoke (Unix only, no key, no model calls)
        # Exercises scripts/vibe.sh + the end-to-end install (symlink) path on
        # Ubuntu and macOS. Skipped on Windows (covered by the PowerShell wrappers).
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export VIBE_PYTHON="$(command -v python)"

          # Direct launcher: no-model commands work without a key.
          sh scripts/vibe.sh --version
          sh scripts/vibe.sh presets
          sh scripts/vibe.sh models

          # VIBE_CALLER_CWD is honored: status reports no workspace in a temp dir.
          tmp="$(mktemp -d)"
          ( cd "$tmp" && sh "$GITHUB_WORKSPACE/scripts/vibe.sh" status ) | grep -q "No active council workspace"

          # End-to-end install into a temp bin, then invoke the installed symlink.
          bin="$(mktemp -d)"
          sh scripts/install-vibe.sh --yes --bin-dir "$bin"
          test -L "$bin/vibe"            # a real symlink was created
          "$bin/vibe" --version
          # Idempotent re-run is a no-op (already ours).
          sh scripts/install-vibe.sh --yes --bin-dir "$bin" | grep -qi "already installed"
